<!doctype html>
<html lang="es">
  <head>
    <!-- Codificación-->
    <meta charset="UTF-8" />
    <!-- Para que la web sea responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Descripción de la página para los buscadores -->
    <meta name="description" content="contenido descriptivo">
    <!-- Título para el navegador y los buscadores -->
    <title>GathSession.</title>
    <!-- Autor de la página -->
    <meta name="author" content="@JonasCampos86">
    <!-- Para algunos navegadores móviles -->
    <meta name="theme-color" content="#1e7bbf">
    <!-- Links -->
    <script type="module" src="/src/main.js"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:opsz,wght@18..144,700&display=swap" rel="stylesheet"> 
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  </head>
  <body>
    <header class="header-principal">
      <!-- Imagen corporativa -->
      <a href="#">
        <img src="/img/GathSession..svg" alt="Logotipode GathSession.">
      </a>
      <!-- Navegador principal -->
      <nav class="nav-principal">
          <ul>
            <li><a href="#">Home</a></li> 
            <li><a href="#">Features</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">About Us</a></li>
          </ul>
      </nav>
    </header>
    <main>
      <!-- Hero principal -->
      <section class="hero-principal">
        <!-- Hero body -->
        <div class="hero__body">
          <!-- Contenido Principal -->
          <div class="hero__content">
          <h1 class="title__principal">
              Build your best 
              community 
              starting from here.
          </h1>
           <p class="subtitle">
            Meet and communicate with the best people to run 
            projects, events or other activities in a more effective 
            and fun way
          </p>
          </div>
          <!-- Botones -->
          <div class="hero__buttons">
            <a href="#" class="button">Get Started</a>
            <a href="#" class="button-white">Learn More</a>
            <img src="/img/Arrow.svg" alt="arrow">
          </div>  
          <!-- Informacion --> 
          <div class="information">
          <article class="info">
            <div class="info__icon"><img src="/img/Comments.svg" alt=""></div>
            <h2>Build Community</h2>
          </article>
          <article class="info">
            <div class="info__icon"><img src="/img/Week Schedule.svg" alt=""></div>
            <h2>Share Events</h2>
          </article>
          <article class="info">
            <div class="info__icon"><img src="/img/Post.svg" alt=""></div>
            <h2>Get Information</h2>
          </article>
          </div>
        </div>
        <!-- Imagenes decorativas -->
        <div class="hero__media">
          <div class="hero__card--1">
            <img src="/img/handsome-serious-calm-guy-with-dark-skin-and-beard-2021-09-02-14-28-37-utc 1.svg" alt="">
          </div>
          <div class="hero__card--2">
            <img src="/img/vertical-shot-of-young-european-woman-in-glasses-w-2021-08-31-09-20-19-utc.svg" alt="">
          </div>
          <div class="hero__card--3">
            <img src="/img/pretty-young-asian-woman-makes-meditating-gesture-2021-08-31-09-20-19-utc 1.svg" alt="">
          </div>
          <div class="hero__card--4">
            <img src="/img/positive-smiling-handsome-caucasian-man-looks-play-2021-08-31-09-20-19-utc 1.svg" alt="">
          </div>
          <div class="hero__card--5">
            <img src="/img/positive-dark-skinned-woman-dressed-in-domestic-go-2021-09-02-14-29-01-utc.svg" alt="">
          </div>
        </div> 
      </section>
    </main>
    
  </body>
</html>
